name: CI/CD

on:
  push:
    branches: [developer, master]
  pull_request:
    branches: [developer, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./dev.db

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

  merge-to-main:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/developer'

    steps:
      - uses: actions/checkout@v4

      - name: Merge developer to main
        run: |
          git config --local user.email "ci@github.com"
          git config --local user.name "GitHub Actions"
          git fetch origin main
          git checkout main
          git merge developer --no-edit
          git push origin main
